<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-primary)}
  .row{display:flex;flex-direction:column;gap:18px}
  .spec{display:grid;grid-template-columns:120px 1fr;gap:24px;align-items:baseline}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.12em}
  .d1{font-family:var(--font-serif);font-weight:500;font-size:64px;line-height:1.05;letter-spacing:-0.02em}
  .h1{font-size:40px;line-height:1.1;letter-spacing:-0.02em;font-weight:600}
  .h2{font-size:30px;line-height:1.2;letter-spacing:-0.01em;font-weight:600}
  .h3{font-size:22px;line-height:1.2;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="spec"><div class="label">Display · 64</div><div class="d1">Engineer-grade</div></div>
  <div class="spec"><div class="label">H1 · 40</div><div class="h1">Selected work, 2019–2025</div></div>
  <div class="spec"><div class="label">H2 · 30</div><div class="h2">Architecture decisions</div></div>
  <div class="spec"><div class="label">H3 · 22</div><div class="h3">Payment systems platform</div></div>
</div>
</body></html>
