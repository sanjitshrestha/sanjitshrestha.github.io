<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-primary)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:64px;border-radius:var(--r-sm);border:1px solid var(--line-hairline)}
  .meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);letter-spacing:.04em}
  .meta b{font-weight:500;color:var(--fg-primary);text-transform:uppercase;letter-spacing:.06em}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><b>0</b><span>FFFFFF</span></div></div>
  <div class="sw"><div class="chip" style="background:#f7f8fa"></div><div class="meta"><b>50</b><span>F7F8FA</span></div></div>
  <div class="sw"><div class="chip" style="background:#eef0f3"></div><div class="meta"><b>100</b><span>EEF0F3</span></div></div>
  <div class="sw"><div class="chip" style="background:#dde1e7"></div><div class="meta"><b>200</b><span>DDE1E7</span></div></div>
  <div class="sw"><div class="chip" style="background:#c4cad3"></div><div class="meta"><b>300</b><span>C4CAD3</span></div></div>
  <div class="sw"><div class="chip" style="background:#9aa1ad"></div><div class="meta"><b>400</b><span>9AA1AD</span></div></div>
  <div class="sw"><div class="chip" style="background:#6b7280"></div><div class="meta"><b>500</b><span>6B7280</span></div></div>
  <div class="sw"><div class="chip" style="background:#4b5563"></div><div class="meta"><b>600</b><span>4B5563</span></div></div>
  <div class="sw"><div class="chip" style="background:#2f3742"></div><div class="meta"><b>700</b><span>2F3742</span></div></div>
  <div class="sw"><div class="chip" style="background:#1c222c"></div><div class="meta"><b>800</b><span>1C222C</span></div></div>
  <div class="sw"><div class="chip" style="background:#11151c"></div><div class="meta"><b>900</b><span>11151C</span></div></div>
  <div class="sw"><div class="chip" style="background:#0a0d12"></div><div class="meta"><b>950</b><span>0A0D12</span></div></div>
</div>
</body></html>
