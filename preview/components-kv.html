<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:#11151c}
  .head{font-family:var(--font-mono);font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
  .kv{border:1px solid #dde1e7;border-radius:6px;overflow:hidden}
  .row{display:grid;grid-template-columns:140px 1fr;font-family:var(--font-mono);font-size:13px;border-bottom:1px solid #eef0f3}
  .row:last-child{border-bottom:none}
  .k{padding:10px 14px;color:#6b7280;letter-spacing:.06em;text-transform:uppercase;background:#f7f8fa;border-right:1px solid #eef0f3}
  .v{padding:10px 14px;color:#11151c}
  .dot{width:6px;height:6px;border-radius:50%;background:#00a352;display:inline-block;margin-right:8px;vertical-align:middle}
</style></head>
<body>
<div class="head">Key/Value metadata · two-column mono</div>
<div class="kv">
  <div class="row"><div class="k">STATUS</div><div class="v"><span class="dot"></span>Active · Open to senior architect roles</div></div>
  <div class="row"><div class="k">LOCATION</div><div class="v">Bhaktapur, Nepal · UTC+05:45 · Remote OK</div></div>
  <div class="row"><div class="k">CURRENT</div><div class="v">SyanSoft Technologies — Software Architect</div></div>
  <div class="row"><div class="k">SINCE</div><div class="v">Sep 2022 · 3y 7mo</div></div>
  <div class="row"><div class="k">CONTACT</div><div class="v">forofficialsanjit@gmail.com</div></div>
</div>
</body></html>
