<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-primary)}
  .head{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
  .row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .tag{font-family:var(--font-mono);font-size:12px;font-weight:500;padding:5px 10px;border:1px solid var(--line-hairline);border-radius:999px;color:var(--fg-secondary);display:inline-flex;align-items:center;gap:6px;letter-spacing:.04em}
  .dot{width:6px;height:6px;border-radius:50%}
  .tag.solid{background:#11151c;color:#fff;border-color:#11151c}
  .tag.signal{border-color:#00a352;color:#00a352}
</style></head>
<body>
  <div class="head">Tech tags · mono capsules</div>
  <div class="row">
    <span class="tag">Java 17</span>
    <span class="tag">Spring Boot 3</span>
    <span class="tag">Kotlin</span>
    <span class="tag">PostgreSQL</span>
    <span class="tag">Kafka</span>
    <span class="tag">Redis</span>
    <span class="tag">Docker</span>
    <span class="tag">Kubernetes</span>
    <span class="tag">AWS</span>
  </div>
  <div class="head">Status indicators</div>
  <div class="row">
    <span class="tag"><span class="dot" style="background:#00a352"></span>Active</span>
    <span class="tag"><span class="dot" style="background:#d97706"></span>In progress</span>
    <span class="tag"><span class="dot" style="background:#9aa1ad"></span>Archived</span>
    <span class="tag"><span class="dot" style="background:#c1272d"></span>Down</span>
    <span class="tag solid">Featured</span>
    <span class="tag signal">Open to work</span>
  </div>
</body></html>
