<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:#11151c}
  .head{font-family:var(--font-mono);font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #dde1e7;border-radius:6px;overflow:hidden}
  .stat{padding:18px;border-right:1px solid #eef0f3}
  .stat:last-child{border-right:none}
  .l{font-family:var(--font-mono);font-size:11px;color:#6b7280;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
  .v{font-family:var(--font-mono);font-size:32px;font-weight:600;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;line-height:1}
  .u{font-family:var(--font-mono);font-size:11px;color:#6b7280;margin-top:6px}
  .v small{font-size:14px;color:#9aa1ad;font-weight:500}
</style></head>
<body>
<div class="head">Stat block · mono numerals, tabular figures</div>
<div class="grid">
  <div class="stat"><div class="l">Years</div><div class="v">06<small>+</small></div><div class="u">since 2019</div></div>
  <div class="stat"><div class="l">Projects</div><div class="v">15<small>+</small></div><div class="u">prod-shipped</div></div>
  <div class="stat"><div class="l">Team led</div><div class="v">30<small>+</small></div><div class="u">peak headcount</div></div>
  <div class="stat"><div class="l">Uptime</div><div class="v">99.9<small>%</small></div><div class="u">P1 services</div></div>
</div>
</body></html>
