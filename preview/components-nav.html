<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);color:var(--fg-primary)}
  nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border:1px solid #dde1e7;border-radius:6px}
  .left{display:flex;align-items:center;gap:14px}
  .mark{display:inline-flex;align-items:center;gap:10px}
  .ml{font-family:var(--font-mono);font-size:13px;font-weight:600;color:#11151c;letter-spacing:-.01em}
  .links{display:flex;gap:22px;font-family:var(--font-mono);font-size:12px;color:#4b5563;letter-spacing:.04em}
  .links a{color:inherit;text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .links a span{color:#9aa1ad}
  .links a.active{color:#11151c}
  .right{display:flex;align-items:center;gap:14px}
  .status{font-family:var(--font-mono);font-size:11px;color:#4b5563;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
  .dot{width:6px;height:6px;border-radius:50%;background:#00a352;box-shadow:0 0 0 3px rgba(0,163,82,.18)}
  .cta{font-family:var(--font-sans);font-size:13px;font-weight:500;background:#11151c;color:#fff;padding:8px 14px;border-radius:4px;text-decoration:none}
</style></head>
<body>
<nav>
  <div class="left">
    <div class="mark"><img src="../assets/logo-mark-light.svg" width="28" height="28"><div class="ml">sanjit.dev</div></div>
  </div>
  <div class="links">
    <a class="active"><span>01</span>Work</a>
    <a><span>02</span>Stack</a>
    <a><span>03</span>Writing</a>
    <a><span>04</span>About</a>
  </div>
  <div class="right">
    <div class="status"><span class="dot"></span>OPEN TO WORK</div>
    <a class="cta" href="#">Résumé →</a>
  </div>
</nav>
</body></html>
