<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-primary)}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .head{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.12em;width:100%;margin-bottom:6px}
  .btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:4px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;line-height:1;transition:all 120ms cubic-bezier(.2,.7,.2,1)}
  .btn-primary{background:#11151c;color:#fff}
  .btn-primary:hover{background:#2f3742}
  .btn-secondary{background:#fff;color:#11151c;border-color:#dde1e7}
  .btn-secondary:hover{border-color:#2f3742}
  .btn-ghost{background:transparent;color:#11151c}
  .btn-ghost:hover{background:#eef0f3}
  .btn-signal{background:#00a352;color:#fff}
  .btn-signal:hover{background:#008543}
  .btn-sm{padding:6px 12px;font-size:13px}
  .btn-lg{padding:14px 22px;font-size:15px}
  .arrow{font-family:var(--font-mono);font-weight:400}
  .ic{width:14px;height:14px;border:1.5px solid currentColor;border-radius:50%;display:inline-block}
</style></head>
<body>
  <div class="head">Primary · Secondary · Ghost · Signal</div>
  <div class="row">
    <button class="btn btn-primary">Download résumé <span class="arrow">→</span></button>
    <button class="btn btn-secondary">View on GitHub</button>
    <button class="btn btn-ghost">Read more</button>
    <button class="btn btn-signal">Schedule a call</button>
  </div>
  <div class="head">Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>
</body></html>
