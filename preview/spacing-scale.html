<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-sans)}
  .grid{display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:80px 1fr 80px;gap:16px;align-items:center;border-top:1px solid var(--line-hairline);padding:6px 0}
  .row:last-child{border-bottom:1px solid var(--line-hairline)}
  .l{font-family:var(--font-mono);font-size:11px;color:#6b7280;letter-spacing:.06em;text-transform:uppercase}
  .bar{background:#11151c;height:14px;border-radius:1px}
  .v{font-family:var(--font-mono);font-size:12px;color:#11151c;text-align:right}
</style></head>
<body>
<div class="grid">
  <div class="row"><div class="l">sp-1</div><div class="bar" style="width:4px"></div><div class="v">4 px</div></div>
  <div class="row"><div class="l">sp-2</div><div class="bar" style="width:8px"></div><div class="v">8 px</div></div>
  <div class="row"><div class="l">sp-3</div><div class="bar" style="width:12px"></div><div class="v">12 px</div></div>
  <div class="row"><div class="l">sp-4</div><div class="bar" style="width:16px"></div><div class="v">16 px</div></div>
  <div class="row"><div class="l">sp-6</div><div class="bar" style="width:24px"></div><div class="v">24 px</div></div>
  <div class="row"><div class="l">sp-8</div><div class="bar" style="width:32px"></div><div class="v">32 px</div></div>
  <div class="row"><div class="l">sp-12</div><div class="bar" style="width:48px"></div><div class="v">48 px</div></div>
  <div class="row"><div class="l">sp-16</div><div class="bar" style="width:64px"></div><div class="v">64 px</div></div>
  <div class="row"><div class="l">sp-24</div><div class="bar" style="width:96px"></div><div class="v">96 px</div></div>
</div>
</body></html>
