<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:#11151c}
  .head{font-family:var(--font-mono);font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:18px}
  .row{display:flex;align-items:center;gap:32px;justify-content:space-around}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .lockup{display:flex;align-items:center;gap:10px}
  .name{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .role{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:#6b7280;text-transform:uppercase}
  .l{font-family:var(--font-mono);font-size:11px;color:#6b7280;letter-spacing:.06em}
  .dark{background:#11151c;padding:12px;border-radius:6px}
  .dark .name{color:#fff}
</style></head>
<body>
<div class="head">Logo · mark · light · dark · lockup</div>
<div class="row">
  <div class="item"><img src="../assets/logo-mark-light.svg" width="64" height="64"><div class="l">light</div></div>
  <div class="item"><div class="dark"><img src="../assets/logo-mark.svg" width="64" height="64"></div><div class="l">dark</div></div>
  <div class="item"><div class="lockup"><img src="../assets/logo-mark-light.svg" width="40" height="40"><div><div class="name">Sanjit Shrestha</div><div class="role">SOFTWARE&nbsp;ARCHITECT</div></div></div><div class="l">lockup</div></div>
</div>
</body></html>
